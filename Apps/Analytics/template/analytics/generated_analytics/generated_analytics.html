{% extends 'home/base.html' %} {% block title %}Generated Analytics - Vyapare{% endblock %} {% block extra_css %}
<style>
  body.generated-grid-mode {
    overflow: hidden;
  }

  body.generated-detail-mode {
    overflow: hidden;
  }

  .generated-analytics-page {
    width: 100%;
    min-height: calc(100vh - 72px);
    height: calc(100vh - 72px);
    padding: 20px 24px 28px;
    background: radial-gradient(circle at 10% 20%, #f6fbf6 0%, #e8f4ea 42%, #ddeff7 100%);
    overflow: hidden;
  }

  .generated-analytics-container {
    width: 100%;
    max-width: none;
    margin: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .generated-analytics-header {
    margin-bottom: 16px;
    padding: 18px 20px;
    border-radius: 14px;
    background: #2f8f2f;
    box-shadow: 0 14px 36px rgba(21, 70, 44, 0.24);
  }

  .generated-analytics-header h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: 0.4px;
    color: #ffffff;
  }

  .dataset-chip {
    display: inline-block;
    padding: 10px 14px;
    border-radius: 999px;
    background: #ffffff;
    border: 1px solid #c7e3c7;
    color: #1f5a1f;
    font-weight: 600;
    box-shadow: 0 8px 16px rgba(27, 77, 27, 0.12);
    margin-bottom: 14px;
  }

  .analytics-workspace {
    display: block;
    flex: 1;
    min-height: 0;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    grid-template-rows: repeat(3, minmax(0, 1fr));
    gap: 14px;
    height: 100%;
    min-height: 0;
  }

  .metric-card {
    border: 1px solid #cfe8cf;
    background: #ffffff;
    border-radius: 14px;
    padding: 18px 18px 16px;
    min-height: 0;
    height: 100%;
    text-align: left;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 18px rgba(30, 86, 33, 0.08);
    transition:
      transform 0.24s ease,
      box-shadow 0.24s ease,
      border-color 0.24s ease;
  }

  .metric-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: linear-gradient(180deg, #2f8f2f 0%, #64b85a 100%);
  }

  .metric-grid > .metric-card:nth-child(3n + 2)::before {
    background: linear-gradient(180deg, #1d4ed8 0%, #3b82f6 100%);
  }

  .metric-card:hover {
    transform: translateY(-4px);
    border-color: #64b85a;
    box-shadow: 0 14px 26px rgba(21, 82, 21, 0.18);
  }

  .metric-card h3 {
    margin: 0 0 8px;
    font-size: 17px;
    color: #1f2937;
  }

  .metric-card p {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.45;
    color: #5b6470;
  }

  .analytics-workspace.selected {
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    gap: 14px;
    align-items: stretch;
    height: 100%;
    min-height: 0;
  }

  .analytics-workspace.selected .metric-grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    height: auto;
    align-self: start;
  }

  .analytics-workspace.selected .metric-card {
    height: auto;
    min-height: 190px;
  }

  .metric-card.hidden {
    display: none;
  }

  .metric-card.active {
    border-color: #2f8f2f;
    box-shadow:
      0 0 0 3px rgba(47, 143, 47, 0.22),
      0 12px 22px rgba(21, 82, 21, 0.18);
  }

  .analytics-panel {
    display: none;
    width: 100%;
    height: 100%;
    min-height: 0;
    border: 1px solid #cfe8cf;
    border-radius: 14px;
    background: #ffffff;
    padding: 16px 16px 18px;
    box-shadow: 0 10px 24px rgba(21, 82, 21, 0.12);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .analytics-panel.visible {
    display: block;
  }

  .analytics-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: linear-gradient(135deg, #e9f6e9 0%, #f4fbf4 100%);
    border: 1px solid #d3ead3;
  }

  .analytics-panel h2 {
    margin: 0;
    color: #215221;
    font-size: 20px;
  }

  .analytics-panel-note {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    color: #1f5a1f;
    background: #e2f4e2;
    border: 1px solid #c7e8c7;
    font-weight: 700;
    text-transform: uppercase;
  }

  .analytics-empty-state {
    min-height: calc(100vh - 300px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #466246;
    border: 2px dashed #bdd9bd;
    border-radius: 12px;
    background: linear-gradient(0deg, rgba(241, 252, 241, 0.92), rgba(241, 252, 241, 0.92)), repeating-linear-gradient(45deg, #eef8ee 0, #eef8ee 12px, #f7fcf7 12px, #f7fcf7 24px);
    font-weight: 600;
  }

  .analytics-panel-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .payment-method-controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 220px));
    gap: 12px;
    align-items: end;
  }

  .control-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-field label {
    font-size: 13px;
    font-weight: 600;
    color: #285528;
  }

  .control-field select {
    height: 40px;
    border-radius: 8px;
    border: 1px solid #c5ddc5;
    padding: 0 10px;
    font-size: 14px;
    color: #1f2937;
    background: #ffffff;
  }

  .control-note {
    font-size: 12px;
    color: #556b55;
    margin: 0;
  }

  .payment-method-chart-wrap {
    border: 1px solid #d5ead5;
    border-radius: 12px;
    padding: 14px;
    background: linear-gradient(180deg, #fcfffc 0%, #f2faf2 100%);
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    min-height: 330px;
  }

  .payment-method-canvas-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 260px;
  }

  #paymentMethodPie {
    width: 280px;
    height: 280px;
    max-width: 100%;
  }

  .payment-method-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .payment-method-legend-item {
    display: grid;
    grid-template-columns: 14px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    font-size: 13px;
    color: #253243;
    background: #ffffff;
    border: 1px solid #deebde;
    border-radius: 8px;
    padding: 7px 9px;
  }

  .legend-color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .legend-value {
    font-weight: 700;
    color: #1f4f1f;
  }

  .chart-summary {
    margin: 0;
    font-size: 13px;
    color: #2f4d2f;
    font-weight: 600;
  }

  .analytics-inline-message {
    min-height: 180px;
    border: 1px dashed #bfd7bf;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4f684f;
    font-weight: 600;
    background: #f7fcf7;
    padding: 12px;
    text-align: center;
  }

  .revenue-trend-chart-wrap {
    border: 1px solid #d5ead5;
    border-radius: 12px;
    padding: 14px;
    background: linear-gradient(180deg, #fcfffc 0%, #f2faf2 100%);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 14px;
    min-height: 330px;
  }

  .revenue-trend-canvas-wrap {
    border: 1px solid #e0ece0;
    background: #ffffff;
    border-radius: 10px;
    padding: 10px;
    min-height: 280px;
  }

  #revenueTrendBar {
    width: 100%;
    height: 280px;
    display: block;
  }

  .revenue-trend-values {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    max-height: 300px;
    padding-right: 2px;
  }

  .revenue-trend-value-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    border: 1px solid #deebde;
    border-radius: 8px;
    padding: 7px 9px;
    font-size: 12.5px;
    color: #253243;
    background: #ffffff;
  }

  .revenue-trend-value-amount {
    font-weight: 700;
    color: #1f4f1f;
  }

  @media (max-width: 900px) {
    body.generated-grid-mode {
      overflow: auto;
    }

    body.generated-detail-mode {
      overflow: auto;
    }

    .generated-analytics-page {
      padding: 14px 10px 20px;
      height: auto;
      min-height: calc(100vh - 72px);
      overflow: visible;
    }

    .metric-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: none;
      height: auto;
    }

    .analytics-workspace.selected {
      grid-template-columns: 1fr;
    }

    .analytics-panel {
      min-height: 320px;
      height: auto;
    }

    .analytics-empty-state {
      min-height: 220px;
    }

    .payment-method-controls {
      grid-template-columns: 1fr;
    }

    .payment-method-chart-wrap {
      grid-template-columns: 1fr;
      min-height: 0;
    }

    .revenue-trend-chart-wrap {
      grid-template-columns: 1fr;
      min-height: 0;
    }

    .payment-method-canvas-wrap {
      min-height: 220px;
    }
  }

  @media (max-width: 640px) {
    .metric-grid {
      grid-template-columns: 1fr;
    }

    .generated-analytics-header h1 {
      font-size: 26px;
    }
  }
</style>
{% endblock %} {% block content %}
<section class="generated-analytics-page">

        <button class="metric-card" type="button" data-analytics-type="sales_overview">

        <button class="metric-card" type="button" data-analytics-type="revenue_trend">

        </button>
        <button class="metric-card" type="button" data-analytics-type="top_selling_items">
          <h3 data-i18n="analytics.generated.topSellingItems.title">Top Selling Items</h3>
          <p data-i18n="analytics.generated.topSellingItems.desc">Best performing products</p>
        </button>
        <button class="metric-card" type="button" data-analytics-type="category_performance">
          <h3 data-i18n="analytics.generated.categoryPerformance.title">Category Performance</h3>
          <p data-i18n="analytics.generated.categoryPerformance.desc">Sales split by category</p>
        </button>
        <button class="metric-card" type="button" data-analytics-type="payment_method_split">
          <h3 data-i18n="analytics.generated.paymentMethodSplit.title">Payment Method Split</h3>
          <p data-i18n="analytics.generated.paymentMethodSplit.desc">Cash, Card, QR and Credit share</p>
        </button>
        <button class="metric-card" type="button" data-analytics-type="order_volume">
          <h3 data-i18n="analytics.generated.orderVolume.title">Order Volume</h3>
          <p data-i18n="analytics.generated.orderVolume.desc">Order count and density</p>
        </button>
        <button class="metric-card" type="button" data-analytics-type="price_band_analysis">
          <h3 data-i18n="analytics.generated.priceBandAnalysis.title">Price Band Analysis</h3>

        <button class="metric-card" type="button" data-analytics-type="revenue_split_by_payment_method">
          <h3 data-i18n="analytics.generated.revenueSplitByPaymentMethod.title">Revenue Split by Payment Method</h3>
          <p data-i18n="analytics.generated.revenueSplitByPaymentMethod.desc">Revenue share by Cash, Card, QR and Credit</p>
        </button>
        <button class="metric-card" type="button" data-analytics-type="day_wise_pattern">
          <h3 data-i18n="analytics.generated.dayWisePattern.title">Day-wise Pattern</h3>
          <p data-i18n="analytics.generated.dayWisePattern.desc">Weekly and day trends</p>
        </button>
      </div>

      <aside class="analytics-panel" id="analyticsPanel" data-dataset-key="{{ dataset_key }}">
        <div class="analytics-panel-head">
          <h2 id="panelTitle" data-i18n="analytics.generated.panelTitle">Analytics</h2>
        </div>
        <div class="analytics-panel-body" id="analyticsPanelBody">
          <div class="analytics-empty-state" data-i18n="analytics.generated.emptyState">Analytics window is currently blank.</div>
        </div>
      </aside>
    </div>
  </div>
</section>

<script>
  (function () {
    const workspace = document.getElementById("analyticsWorkspace");
    const panel = document.getElementById("analyticsPanel");
    const panelBody = document.getElementById("analyticsPanelBody");
    const panelTitle = document.getElementById("panelTitle");
    const datasetKey = panel.dataset.datasetKey;
    const cards = document.querySelectorAll(".metric-card");
    const panelTitleKey = "analytics.generated.panelTitle";

    const piePalette = ["#2e7d32", "#00796b", "#ef6c00", "#00838f", "#5d4037", "#9c27b0", "#1565c0", "#c2185b"];

    function getTranslatedText(key, fallback) {
      const selectedLanguage = localStorage.getItem("vyapareLanguage") || "en";
      const dictionary = window.translations?.[selectedLanguage] || window.translations?.en || {};
      return dictionary[key] || fallback;
    }

    function setGridMode() {
      document.body.classList.add("generated-grid-mode");
      document.body.classList.remove("generated-detail-mode");
    }

    function setDetailMode() {
      document.body.classList.remove("generated-grid-mode");
      document.body.classList.add("generated-detail-mode");
    }

    function escapeHtml(value) {
      return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function renderInlineMessage(message) {
      panelBody.innerHTML = '<div class="analytics-inline-message">' + escapeHtml(message) + "</div>";
    }

    function renderPaymentChartMessage(message) {
      const chartStateContainer = document.getElementById("paymentMethodChartState");
      if (!chartStateContainer) {
        return;
      }

      chartStateContainer.innerHTML = '<div class="analytics-inline-message">' + escapeHtml(message) + "</div>";
    }

    function drawPieChart(canvas, splitData) {
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      const radius = Math.min(width, height) * 0.4;
      const centerX = width / 2;
      const centerY = height / 2;

      ctx.clearRect(0, 0, width, height);

      let currentAngle = -Math.PI / 2;

      splitData.forEach(function (item, index) {
        const sliceAngle = (item.percentage / 100) * Math.PI * 2;
        const color = piePalette[index % piePalette.length];

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        currentAngle += sliceAngle;
      });

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
    }

    function drawBarChart(canvas, points) {
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      const margin = { top: 20, right: 20, bottom: 48, left: 52 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      ctx.clearRect(0, 0, width, height);

      const values = points.map(function (point) {
        return Number(point.revenue || 0);
      });
      const maxValue = Math.max.apply(null, values.concat([1]));

      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, margin.top + innerHeight);
      ctx.lineTo(margin.left + innerWidth, margin.top + innerHeight);
      ctx.stroke();

      const step = innerWidth / Math.max(points.length, 1);
      const barWidth = Math.max(6, step * 0.64);
      const skipFactor = Math.max(1, Math.ceil(points.length / 12));

      points.forEach(function (point, index) {
        const value = Number(point.revenue || 0);
        const x = margin.left + index * step + (step - barWidth) / 2;
        const barHeight = (value / maxValue) * innerHeight;
        const y = margin.top + innerHeight - barHeight;

        ctx.fillStyle = "#2563eb";
        ctx.fillRect(x, y, barWidth, barHeight);

        if (index % skipFactor === 0) {
          ctx.fillStyle = "#475569";
          ctx.font = "11px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(point.label), x + barWidth / 2, margin.top + innerHeight + 16);
        }
      });

      ctx.fillStyle = "#334155";
      ctx.font = "11px sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("0", margin.left - 6, margin.top + innerHeight + 3);
      ctx.fillText("Rs. " + maxValue.toFixed(2), margin.left - 6, margin.top + 3);
    }

    function buildCountLegendHtml(splitData) {
      return splitData
        .map(function (item, index) {
          const color = piePalette[index % piePalette.length];
          return '<div class="payment-method-legend-item">' + '<span class="legend-color-dot" style="background:' + color + '"></span>' + "<span>" + escapeHtml(item.payment_method) + "</span>" + '<span class="legend-value">' + item.count + " (" + item.percentage.toFixed(2) + "%)</span>" + "</div>";
        })
        .join("");
    }

    function buildRevenueLegendHtml(splitData) {
      return splitData
        .map(function (item, index) {
          const color = piePalette[index % piePalette.length];
          return '<div class="payment-method-legend-item">' + '<span class="legend-color-dot" style="background:' + color + '"></span>' + "<span>" + escapeHtml(item.payment_method) + "</span>" + '<span class="legend-value">Rs. ' + Number(item.revenue || 0).toFixed(2) + " (" + Number(item.percentage || 0).toFixed(2) + "%)</span>" + "</div>";
        })
        .join("");
    }

    function buildCategoryLegendHtml(splitData) {
      return splitData
        .map(function (item, index) {
          const color = piePalette[index % piePalette.length];
          return '<div class="payment-method-legend-item">' + '<span class="legend-color-dot" style="background:' + color + '"></span>' + "<span>" + escapeHtml(item.category) + "</span>" + '<span class="legend-value">' + Number(item.count || 0) + " (" + Number(item.percentage || 0).toFixed(2) + "%)</span>" + "</div>";
        })
        .join("");
    }

    function renderChartState(data) {
      const chartStateContainer = document.getElementById("paymentMethodChartState");
      if (!chartStateContainer) {
        return;
      }

      if (!data.split || !data.split.length) {
        renderPaymentChartMessage(getTranslatedText("analytics.generated.paymentMethodSplit.noRecords", "No payment records found for the selected filter."));
        return;
      }

      chartStateContainer.innerHTML = '<div class="payment-method-chart-wrap">' + '  <div class="payment-method-canvas-wrap"><canvas id="paymentMethodPie" width="320" height="320" aria-label="Payment Method Split Pie Chart"></canvas></div>' + '  <div class="payment-method-legend" id="paymentMethodLegend"></div>' + "</div>" + '<p class="chart-summary">' + getTranslatedText("analytics.generated.paymentMethodSplit.totalRecords", "Total records") + ": " + data.total_records + "</p>";

      const canvas = document.getElementById("paymentMethodPie");
      const legend = document.getElementById("paymentMethodLegend");
      drawPieChart(canvas, data.split);
      legend.innerHTML = buildCountLegendHtml(data.split);
    }

    function renderRevenueChartState(data) {
      const chartStateContainer = document.getElementById("revenueSplitChartState");
      if (!chartStateContainer) {
        return;
      }

      if (!data.split || !data.split.length) {
        chartStateContainer.innerHTML = '<div class="analytics-inline-message">' + escapeHtml(getTranslatedText("analytics.generated.revenueSplitByPaymentMethod.noRecords", "No revenue records found for the selected filter.")) + "</div>";
        return;
      }

      chartStateContainer.innerHTML =
        '<div class="payment-method-chart-wrap">' + '  <div class="payment-method-canvas-wrap"><canvas id="revenueSplitPie" width="320" height="320" aria-label="Revenue Split by Payment Method Pie Chart"></canvas></div>' + '  <div class="payment-method-legend" id="revenueSplitLegend"></div>' + "</div>" + '<p class="chart-summary">' + getTranslatedText("analytics.generated.revenueSplitByPaymentMethod.totalRevenue", "Total revenue") + ": Rs. " + Number(data.total_revenue || 0).toFixed(2) + "</p>";

      const canvas = document.getElementById("revenueSplitPie");
      const legend = document.getElementById("revenueSplitLegend");
      drawPieChart(canvas, data.split);
      legend.innerHTML = buildRevenueLegendHtml(data.split);
    }

    function renderCategoryPerformanceChartState(data) {
      const chartStateContainer = document.getElementById("categoryPerformanceChartState");
      if (!chartStateContainer) {
        return;
      }

      if (!data.split || !data.split.length) {
        chartStateContainer.innerHTML = '<div class="analytics-inline-message">' + escapeHtml(getTranslatedText("analytics.generated.categoryPerformance.noRecords", "No category records found for the selected filter.")) + "</div>";
        return;
      }

      chartStateContainer.innerHTML =
        '<div class="payment-method-chart-wrap">' + '  <div class="payment-method-canvas-wrap"><canvas id="categoryPerformancePie" width="320" height="320" aria-label="Category Performance Pie Chart"></canvas></div>' + '  <div class="payment-method-legend" id="categoryPerformanceLegend"></div>' + "</div>" + '<p class="chart-summary">' + getTranslatedText("analytics.generated.categoryPerformance.totalRecords", "Total records") + ": " + Number(data.total_records || 0) + "</p>";

      const canvas = document.getElementById("categoryPerformancePie");
      const legend = document.getElementById("categoryPerformanceLegend");
      drawPieChart(canvas, data.split);
      legend.innerHTML = buildCategoryLegendHtml(data.split);
    }

    function buildRevenueTrendValuesHtml(points) {
      return points
        .filter(function (point) {
          return Number(point.revenue || 0) > 0;
        })
        .map(function (point) {
          return '<div class="revenue-trend-value-item"><span>' + escapeHtml(point.label) + '</span><span class="revenue-trend-value-amount">Rs. ' + Number(point.revenue || 0).toFixed(2) + "</span></div>";
        })
        .join("");
    }

    function renderRevenueTrendChartState(data) {

    async function fetchJson(url) {
      const response = await fetch(url, {
        method: "GET",
        headers: {
          Accept: "application/json",
        },
      });

      let payload = {};
      try {
        payload = await response.json();
      } catch (error) {
        payload = {};
      }

      if (!response.ok) {
        throw new Error(payload.message || "Request failed.");
      }

      return payload;
    }

    function closeDetail() {
      cards.forEach(function (other) {
        other.classList.remove("active", "hidden");
      });

      workspace.classList.remove("selected");
      panel.classList.remove("visible");
      panelTitle.textContent = getTranslatedText(panelTitleKey, "Analytics");
      panelBody.innerHTML = '<div class="analytics-empty-state" data-i18n="analytics.generated.emptyState">Analytics window is currently blank.</div>';
      setGridMode();
    }

    setGridMode();

    cards.forEach(function (card) {
      card.addEventListener("click", function () {
        if (card.classList.contains("active") && workspace.classList.contains("selected")) {
          closeDetail();
          return;
        }

        const titleText = card.querySelector("h3")?.textContent?.trim();
        const title = titleText || getTranslatedText(panelTitleKey, "Analytics");

        cards.forEach(function (other) {
          other.classList.remove("active");
          if (other !== card) {
            other.classList.add("hidden");
          }
        });

        card.classList.add("active");
        workspace.classList.add("selected");
        panel.classList.add("visible");
        panelTitle.textContent = title;
        setDetailMode();

        const analyticsType = card.dataset.analyticsType;
        if (analyticsType === "revenue_trend") {
          renderRevenueTrendPanel();
        } else if (analyticsType === "category_performance") {
          renderCategoryPerformancePanel();
        } else if (analyticsType === "payment_method_split") {
          renderPaymentMethodSplitPanel();
        } else if (analyticsType === "revenue_split_by_payment_method") {
          renderRevenueSplitPanel();
        } else {
          renderInlineMessage(getTranslatedText("analytics.generated.placeholderNotIntegrated", "This analytics card UI is ready. API integration will be added next."));
        }
      });
    });
  })();
