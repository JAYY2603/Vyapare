{% extends 'home/base.html' %} {% load static %} {% block title %}Register -
Vyapare{% endblock %} {% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="auth-subtitle">Join Vyapare to manage your business data</p>

    <form method="POST" class="auth-form" id="registerForm">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_full_name">Full Name</label>
        <input
          type="text"
          id="id_full_name"
          name="full_name"
          placeholder="Enter your full name"
          autocomplete="name"
          required
        />
        <div class="field-error" id="full_nameError"></div>
      </div>

      <div class="form-group">
        <label for="id_email">Email</label>
        <input
          type="email"
          id="id_email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required
        />
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input
          type="password"
          id="id_password"
          name="password"
          placeholder="Enter your password"
          autocomplete="new-password"
          required
        />
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="field-error" id="registerApiError"></div>
      <button type="submit" class="btn btn-primary btn-block">
        Create account
      </button>
    </form>

    <div class="auth-footer">
      <p>
        Already have an account? <a href="{% url 'home:login' %}">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  const registerForm = document.getElementById("registerForm");
  const registerApiError = document.getElementById("registerApiError");

  const clearRegisterErrors = () => {
    registerApiError.textContent = "";
    registerForm.querySelectorAll(".field-error").forEach((el) => {
      el.textContent = "";
    });
  };

  registerForm?.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearRegisterErrors();

    const formData = new FormData(registerForm);
    const payload = {
      full_name: (formData.get("full_name") || "").trim(),
      email: (formData.get("email") || "").trim(),
      password: formData.get("password") || "",
    };

    const csrfToken = formData.get("csrfmiddlewaretoken");

    const response = await fetch("{% url 'home:api_register' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken,
      },
      body: JSON.stringify(payload),
      credentials: "same-origin",
    });

    const data = await response.json();

    if (!response.ok) {
      if (data.errors) {
        Object.entries(data.errors).forEach(([field, messages]) => {
          const errorNode = document.getElementById(`${field}Error`);
          if (errorNode) {
            errorNode.textContent = Array.isArray(messages)
              ? messages.join(" ")
              : messages;
          }
        });
      }

      if (data.message) {
        registerApiError.textContent = data.message;
      }

      return;
    }

    window.location.href = data.redirect_url || "{% url 'home:login' %}";
  });
</script>
{% endblock %}
