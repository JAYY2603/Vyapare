{% extends 'home/base.html' %} {% load static %} {% block title %}Register - Vyapare{% endblock %} {% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 data-i18n="register.title">Create Account</h1>
    <p class="auth-subtitle" data-i18n="register.subtitle">Join Vyapare to manage your business data</p>

    <form method="POST" class="auth-form" id="registerForm">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_full_name" data-i18n="register.fullName">Full Name</label>
        <input type="text" id="id_full_name" name="full_name" placeholder="Enter your full name" data-i18n-placeholder="register.fullName.placeholder" autocomplete="name" required />
        <div class="field-error" id="full_nameError"></div>
      </div>

      <div class="form-group">
        <label for="id_email" data-i18n="register.email">Email</label>
        <input type="email" id="id_email" name="email" placeholder="Enter your email" data-i18n-placeholder="register.email.placeholder" autocomplete="email" required />
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="id_password" data-i18n="register.password">Password</label>
        <input type="password" id="id_password" name="password" placeholder="Enter your password" data-i18n-placeholder="register.password.placeholder" autocomplete="new-password" required />
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="field-error" id="registerApiError"></div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="register.button">Create account</button>
    </form>

    <div class="auth-footer">
      <p>
        <span data-i18n="register.hasAccount">Already have an account?</span>
        <a href="{% url 'home:login' %}" data-i18n="register.loginLink">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  const registerForm = document.getElementById("registerForm");
  const registerApiError = document.getElementById("registerApiError");

  const errorMessageMap = {
    "Full name is required.": "error.fullNameRequired",
    "An account with this email already exists.": "error.emailExists",
    "Invalid email or password.": "error.invalidEmailPassword",
    "Please fix the highlighted errors.": "error.fixErrors",
    "This field may not be blank.": "error.emailBlank",
    "Enter a valid email address.": "error.emailInvalid",
    "Ensure this field has at least 8 characters.": "error.passwordMinLength",
    "This password is too common.": "error.passwordCommon",
    "This password is entirely numeric.": "error.passwordNumeric",
    "Registration successful.": "error.registrationSuccess",
  };

  const translateErrorMessage = (message) => {
    const dictionary = window.translations?.[localStorage.getItem("vyapareLanguage") || "en"] || window.translations?.en || {};
    const translationKey = errorMessageMap[message];
    return translationKey && dictionary[translationKey] ? dictionary[translationKey] : message;
  };

  const clearRegisterErrors = () => {
    registerApiError.textContent = "";
    registerForm.querySelectorAll(".field-error").forEach((el) => {
      el.textContent = "";
    });
  };

  registerForm?.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearRegisterErrors();

    const formData = new FormData(registerForm);
    const payload = {
      full_name: (formData.get("full_name") || "").trim(),
      email: (formData.get("email") || "").trim(),
      password: formData.get("password") || "",
    };

    const csrfToken = formData.get("csrfmiddlewaretoken");

    const response = await fetch("{% url 'home:api_register' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken,
      },
      body: JSON.stringify(payload),
      credentials: "same-origin",
    });

    const data = await response.json();

    if (!response.ok) {
      if (data.errors) {
        Object.entries(data.errors).forEach(([field, messages]) => {
          const errorNode = document.getElementById(`${field}Error`);
          if (errorNode) {
            const translatedMessages = (Array.isArray(messages) ? messages : [messages]).map(translateErrorMessage);
            errorNode.textContent = translatedMessages.join(" ");
          }
        });
      }

      if (data.message) {
        registerApiError.textContent = translateErrorMessage(data.message);
      }

      return;
    }

    window.location.href = data.redirect_url || "{% url 'home:login' %}";
  });
</script>
{% endblock %}
