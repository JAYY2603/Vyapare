{% extends 'home/base.html' %} {% load static %} {% block title %}Vyapare -
Home{% endblock %} {% block content %}
<section class="hero">
  <video class="hero-video" autoplay muted playsinline>
    <source src="{% static 'videos/homevideo1.mp4' %}" type="video/mp4" />
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-container">
    <div class="hero-content">
      <h1>
        <span id="heroLine1">Is your business really scaling?</span><br />
        <span class="hero-highlight">
          <span id="heroLine2Prefix">Get</span>
          <span id="heroLine2Highlight">Actionable Insights</span>
        </span>
      </h1>

      {% if not user.is_authenticated %}
      <div class="hero-buttons">
        <a href="{% url 'home:login' %}" class="btn btn-primary">Get Started</a>
      </div>
      {% else %}
      <div class="hero-buttons">
        <a href="{% url 'dataset:dataset_list' %}" class="btn btn-primary"
          >View Datasets</a
        >
      </div>
      {% endif %}
    </div>
  </div>
</section>

<script>
  const heroVideo = document.querySelector(".hero-video");
  const heroVideoSource = heroVideo?.querySelector("source");
  const heroLine1 = document.getElementById("heroLine1");
  const heroLine2Prefix = document.getElementById("heroLine2Prefix");
  const heroLine2Highlight = document.getElementById("heroLine2Highlight");
  const heroVideos = [
    "{% static 'videos/homevideo1.mp4' %}",
    "{% static 'videos/homevideo2.mp4' %}",
    "{% static 'videos/homevideo3.mp4' %}",
  ];
  const heroMessages = [
    {
      line1: "Is your business really scaling?",
      line2Prefix: "Get",
      line2Highlight: "Actionable Insights",
    },
    {
      line1: "Sales slipping through the cracks?",
      line2Prefix: "Track",
      line2Highlight: "Every Transaction",
    },
    {
      line1: "Ready to plan your next move?",
      line2Prefix: "Predict",
      line2Highlight: "Future Growth",
    },
  ];
  let currentHeroVideoIndex = 0;

  const updateHeroMessage = (index) => {
    const message = heroMessages[index];
    if (!message || !heroLine1 || !heroLine2Prefix || !heroLine2Highlight) {
      return;
    }

    heroLine1.textContent = message.line1;
    heroLine2Prefix.textContent = message.line2Prefix;
    heroLine2Highlight.textContent = message.line2Highlight;
  };

  if (heroVideo && heroVideoSource) {
    updateHeroMessage(currentHeroVideoIndex);

    heroVideo.addEventListener("ended", () => {
      currentHeroVideoIndex = (currentHeroVideoIndex + 1) % heroVideos.length;
      updateHeroMessage(currentHeroVideoIndex);
      heroVideoSource.src = heroVideos[currentHeroVideoIndex];
      heroVideo.load();
      heroVideo.play().catch(() => {
        // Autoplay restrictions may block playback in some browsers.
      });
    });
  }
</script>
{% endblock %}
