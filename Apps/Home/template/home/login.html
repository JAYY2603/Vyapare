{% extends 'home/base.html' %} {% load static %} {% block title %}Login -
Vyapare{% endblock %} {% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="auth-subtitle">Login to your Vyapare account</p>

    <form method="POST" class="auth-form" id="loginForm">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email</label>
        <input
          type="email"
          id="id_email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required
        />
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input
          type="password"
          id="id_password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="field-error" id="loginApiError"></div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="auth-footer">
      <p>
        Don't have an account?
        <a href="{% url 'home:register' %}">Create account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  const loginForm = document.getElementById("loginForm");
  const loginApiError = document.getElementById("loginApiError");

  const clearLoginErrors = () => {
    loginApiError.textContent = "";
    loginForm.querySelectorAll(".field-error").forEach((el) => {
      el.textContent = "";
    });
  };

  loginForm?.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearLoginErrors();

    const formData = new FormData(loginForm);
    const payload = {
      email: (formData.get("email") || "").trim(),
      password: formData.get("password") || "",
    };

    const csrfToken = formData.get("csrfmiddlewaretoken");

    const response = await fetch("{% url 'home:api_login' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken,
      },
      body: JSON.stringify(payload),
      credentials: "same-origin",
    });

    const data = await response.json();

    if (!response.ok) {
      if (data.errors) {
        Object.entries(data.errors).forEach(([field, messages]) => {
          const errorNode = document.getElementById(`${field}Error`);
          if (errorNode) {
            errorNode.textContent = Array.isArray(messages)
              ? messages.join(" ")
              : messages;
          }
        });
      }

      if (data.message) {
        loginApiError.textContent = data.message;
      }

      return;
    }

    window.location.href =
      data.redirect_url || "{% url 'dataset:dataset_list' %}";
  });
</script>
{% endblock %}
